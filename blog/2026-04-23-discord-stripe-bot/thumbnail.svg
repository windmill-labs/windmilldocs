  <text x="130" y="161" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700" fill="#ffffff">Windmill</text>

  <!-- Text: Title -->
  <text x="80" y="330" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-0.03em">Sandboxed AI bots</text>

  <!-- Text: Subtitle -->
  <text x="80" y="390" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#94a3b8">Give capabilities, not credentials</text>
</svg>
